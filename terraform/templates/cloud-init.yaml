#cloud-config
package_update: true
packages:
  - nginx

write_files:
  - path: /tmp/render-index.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      HOST=$(hostname)
      cat >/var/www/html/index.nginx-debian.html <<HTML
      <!doctype html>
      <html>
      <head><meta charset="utf-8"><title>hexlet-77</title></head>
      <body style="font-family:sans-serif;padding:2em">
        <h1>hexlet-77 is alive</h1>
        <p>Served by <code>$HOST</code></p>
      </body>
      </html>
      HTML

runcmd:
  - /tmp/render-index.sh
  - systemctl enable nginx
  - systemctl restart nginx
